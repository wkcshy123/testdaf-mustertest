{% extends "base.html" %}

{% block title %}录音测试 · TestDaF{% endblock %}

{% block content %}
<section class="page-head">
  <h1>录音功能测试</h1>
  <p class="muted">这个页面用于排查浏览器 MediaRecorder 录音是否正常工作。</p>
</section>

<section class="panel">
  <h2>步骤</h2>
  <ol>
    <li>点击「请求麦克风」按钮，授权浏览器访问麦克风</li>
    <li>点击「开始录音」，对着麦克风说话</li>
    <li>点击「停止录音」</li>
    <li>点击「播放」试听录音</li>
  </ol>

  <div class="nav" style="margin-bottom:16px;">
    <button type="button" class="button" id="mic-btn">请求麦克风</button>
    <button type="button" class="button primary" id="rec-start-btn" disabled>开始录音</button>
    <button type="button" class="button" id="rec-stop-btn" disabled>停止录音</button>
  </div>

  <div id="log" style="background:#fff;border:1px solid #e5ddcf;border-radius:12px;padding:16px;font-family:monospace;font-size:13px;min-height:120px;">
    <p style="color:#756d61;">日志将显示在这里…</p>
  </div>

  <div id="playback-area" style="margin-top:16px;display:none;">
    <p><strong>录音回放：</strong></p>
    <audio id="playback" controls style="width:100%;"></audio>
    <p class="muted" id="blob-info"></p>
    <a class="button" id="download-link" style="margin-top:8px;">下载录音文件</a>
  </div>
</section>

<script>
(function () {
  var logBox = document.getElementById("log");
  var micBtn = document.getElementById("mic-btn");
  var startBtn = document.getElementById("rec-start-btn");
  var stopBtn = document.getElementById("rec-stop-btn");
  var stream = null;
  var recorder = null;
  var chunks = [];

  function log(msg) {
    var p = document.createElement("p");
    p.textContent = new Date().toLocaleTimeString() + " — " + msg;
    logBox.appendChild(p);
    console.log(msg);
  }

  // List supported MIME types
  var types = [
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/ogg;codecs=opus",
    "audio/mp4",
  ];
  log("MediaRecorder 支持检测：");
  types.forEach(function (t) {
    var ok = window.MediaRecorder && MediaRecorder.isTypeSupported(t);
    log("  " + t + " → " + (ok ? "✅ 支持" : "❌ 不支持"));
  });

  if (!window.MediaRecorder) {
    log("⚠️ 此浏览器不支持 MediaRecorder API！");
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    log("⚠️ 此浏览器不支持 getUserMedia API！");
  }

  micBtn.addEventListener("click", function () {
    log("正在请求麦克风权限…");
    navigator.mediaDevices.getUserMedia({ audio: true }).then(function (s) {
      stream = s;
      log("✅ 麦克风授权成功！");
      log("音频轨道数：" + stream.getAudioTracks().length);
      stream.getAudioTracks().forEach(function (track, i) {
        log("  轨道 " + i + "：" + track.label + " (enabled=" + track.enabled + ")");
      });
      startBtn.disabled = false;
      micBtn.disabled = true;
    }).catch(function (err) {
      log("❌ 麦克风授权失败：" + err.name + " — " + err.message);
    });
  });

  startBtn.addEventListener("click", function () {
    chunks = [];

    // Pick best supported MIME type
    var mimeType = "";
    for (var i = 0; i < types.length; i++) {
      if (MediaRecorder.isTypeSupported(types[i])) {
        mimeType = types[i];
        break;
      }
    }
    log("使用 MIME type：" + (mimeType || "（浏览器默认）"));

    try {
      recorder = mimeType
        ? new MediaRecorder(stream, { mimeType: mimeType })
        : new MediaRecorder(stream);
    } catch (e) {
      log("❌ 创建 MediaRecorder 失败：" + e.message);
      return;
    }

    log("MediaRecorder 状态：" + recorder.state);
    log("MediaRecorder mimeType：" + recorder.mimeType);

    recorder.ondataavailable = function (e) {
      log("dataavailable 事件：size=" + (e.data ? e.data.size : 0) + " type=" + (e.data ? e.data.type : "none"));
      if (e.data && e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstart = function () {
      log("录音已开始 (state=" + recorder.state + ")");
    };

    recorder.onstop = function () {
      log("录音已停止。chunks 数量：" + chunks.length);
      var totalSize = chunks.reduce(function (sum, c) { return sum + c.size; }, 0);
      log("总数据大小：" + totalSize + " bytes");
      var blob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
      log("Blob size：" + blob.size + " type：" + blob.type);
      var url = URL.createObjectURL(blob);
      var playback = document.getElementById("playback");
      playback.src = url;
      document.getElementById("playback-area").style.display = "block";
      document.getElementById("blob-info").textContent =
        "文件大小：" + (blob.size / 1024).toFixed(1) + " KB · 格式：" + blob.type;

      // Download link
      var ext = blob.type.indexOf("mp4") !== -1 ? "mp4" : "webm";
      var dl = document.getElementById("download-link");
      dl.href = url;
      dl.download = "test_recording." + ext;
    };

    recorder.onerror = function (e) {
      log("❌ MediaRecorder 错误：" + e.error.name + " — " + e.error.message);
    };

    recorder.start(1000); // emit data every 1 second
    startBtn.disabled = true;
    stopBtn.disabled = false;
  });

  stopBtn.addEventListener("click", function () {
    if (recorder && recorder.state !== "inactive") {
      recorder.requestData(); // flush remaining data
      recorder.stop();
    }
    stopBtn.disabled = true;
    startBtn.disabled = false;
  });
})();
</script>
{% endblock %}
