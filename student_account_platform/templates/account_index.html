{% extends "base.html" %}

{% block title %}学生账号 · TestDaF{% endblock %}

{% block content %}
<section class="page-head">
  <p class="muted">Student Account System</p>
  <h1>学生账号系统</h1>
  <p>注册账号后，即可进入答题系统进行练习和模考。作答记录会与你的账号关联。</p>
</section>

<section class="panel">
  {% if student %}
    <p>你已经登录，<strong>{{ student.name }}</strong>。</p>
    <div class="form-actions">
      <a class="button primary" href="/profile">进入个人中心</a>
      <a class="button" href="{{ student_system_url | default('http://127.0.0.1:8001/') }}">直接答题</a>
    </div>
  {% else %}
    <p>还没有账号？注册一个，或直接登录开始答题。</p>
    <div class="form-actions">
      <a class="button primary" href="/register">注册新账号</a>
      <a class="button" href="/login">登录</a>
    </div>
  {% endif %}
</section>
{% endblock %}
