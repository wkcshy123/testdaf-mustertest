{% extends "base.html" %}

{% block title %}注册 · TestDaF 学生账号{% endblock %}

{% block content %}
<section class="page-head">
  <p class="muted">Register</p>
  <h1>注册学生账号</h1>
  <p class="muted">填写信息创建账号，注册成功后会自动登录。</p>
</section>

<section class="panel">
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form class="form" method="post" action="/register">
    <label>
      姓名
      <input type="text" name="name" required maxlength="40" placeholder="用于作答记录展示">
    </label>
    <label>
      用户名
      <input type="text" name="username" required minlength="3" maxlength="32" placeholder="登录时使用">
    </label>
    <label>
      密码
      <input type="password" name="password" required minlength="6" placeholder="至少 6 个字符">
    </label>
    <div class="form-actions">
      <button class="button primary" type="submit">创建账号</button>
      <a class="hint" href="/login">已有账号？去登录</a>
    </div>
  </form>
</section>
{% endblock %}
